name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hello-app .

      - name: Run container
        run: |
          docker run -d -p 3000:3000 --name test-app hello-app
          sleep 5

      - name: Test endpoint
        run: |
          curl -f http://localhost:3000 || exit 1

      - name: Cleanup
        run: docker rm -f test-app
